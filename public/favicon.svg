<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2444"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b4e6"/>
      <stop offset="100%" stop-color="#38d9f5"/>
    </linearGradient>
  </defs>
  <!-- Фон — скруглённый квадрат -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Обводка-свечение -->
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  <!-- Крыша дома -->
  <polygon points="32,10 54,28 10,28" fill="url(#glow)"/>
  <!-- Труба -->
  <rect x="42" y="14" width="5" height="10" rx="1" fill="#38d9f5"/>
  <!-- Стены дома -->
  <rect x="14" y="27" width="36" height="24" rx="2" fill="#1a3a6b"/>
  <!-- Дверь -->
  <rect x="27" y="38" width="10" height="13" rx="2" fill="url(#glow)"/>
  <!-- Окно левое -->
  <rect x="17" y="32" width="8" height="7" rx="1.5" fill="#38d9f5" opacity="0.8"/>
  <!-- Окно правое -->
  <rect x="39" y="32" width="8" height="7" rx="1.5" fill="#38d9f5" opacity="0.8"/>
</svg>
